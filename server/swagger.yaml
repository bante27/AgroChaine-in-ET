openapi: 3.0.3
info:
  title: Marketplace API
  version: 1.0.0
  description: API documentation for the marketplace platform.
servers:
  - url: http://localhost:5000
    description: Local development server

security:
  - bearerAuth: []

tags:
  - name: Users
    description: User registration, authentication, and profile management
  - name: Products
    description: Product creation, retrieval, reviews, and likes
  - name: Transactions
    description: Purchase transactions and management
  - name: Admin
    description: Administrative actions for managing users, products, transactions, and verifications

paths:
  ######################
  # USERS
  ######################
  /api/users/register:
    post:
      tags: [Users]
      summary: Register a new user and send OTP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '200':
          description: OTP sent to email for verification
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessMessage'
        '400':
          description: Validation error or email already registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error or email credentials missing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/users/verify-otp:
    post:
      tags: [Users]
      summary: Verify OTP to complete registration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyOtpRequest'
      responses:
        '201':
          description: Registration complete, user created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Invalid email, OTP, or OTP expired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error verifying OTP
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/users/login:
    post:
      tags: [Users]
      summary: Login a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error during login
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/users/profile:
    get:
      tags: [Users]
      summary: Get the logged-in user's profile with populated fields
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User profile with populated products and transactions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error fetching profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    patch:
      tags: [Users]
      summary: Update the logged-in user's profile (username, location)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        '200':
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          description: Username taken
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error updating profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/users/profile-pic:
    post:
      tags: [Users]
      summary: Upload user profile picture
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                profilePic:
                  type: string
                  format: binary
      responses:
        '200':
          description: Profile picture updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfilePicResponse'
        '400':
          description: No file uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error uploading profile picture
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/users/verify-id:
    post:
      tags: [Users]
      summary: Upload government ID images (front and back)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [govIdFront, govIdBack]
              properties:
                govIdFront:
                  type: string
                  format: binary
                govIdBack:
                  type: string
                  format: binary
      responses:
        '200':
          description: ID uploaded, pending admin review
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GovIdResponse'
        '400':
          description: Both ID images required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error uploading government ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/users/verify-id/{userId}:
    post:
      tags: [Admin]
      summary: Approve or reject government ID verification (admin only)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
          description: The user's public ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [approved, rejected]
                  description: Action to approve or reject the verification
      responses:
        '200':
          description: Verification status updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  message: { type: string }
                  user:
                    type: object
                    properties:
                      userId: { type: string }
                      fullName: { type: string }
                      email: { type: string }
                      verified: { type: boolean }
                      govIdStatus: { type: string, enum: [pending, approved, rejected] }
        '400':
          description: Invalid status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Admin access required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error processing ID verification
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/users/{userId}:
    get:
      tags: [Users]
      summary: Get a public profile by userId
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
          description: The user's public ID
      responses:
        '200':
          description: Public profile retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error fetching user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/users/{userId}/rate:
    post:
      tags: [Users]
      summary: Rate a user (1–5)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RateUserRequest'
      responses:
        '200':
          description: User rated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          description: Rating must be between 1 and 5
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error rating user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/users/add-balance:
    post:
      tags: [Users]
      summary: Add balance to logged-in user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddBalanceRequest'
      responses:
        '200':
          description: Balance added
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BalanceResponse'
        '400':
          description: Amount must be greater than 0
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error adding balance
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/users/make-admin/{userId}:
    post:
      tags: [Users]
      summary: Promote a user to admin (dev only)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User promoted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  ######################
  # PRODUCTS
  ######################
  /api/products:
    post:
      tags: [Products]
      summary: Add a new product
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [title, price, originAddress, type, quantity]
              properties:
                title:
                  type: string
                price:
                  type: number
                  minimum: 0
                originAddress:
                  type: string
                type:
                  type: string
                quantity:
                  type: integer
                  minimum: 1
                description:
                  type: string
                comment:
                  type: string
                images:
                  type: array
                  items:
                    type: string
                    format: binary
                  maxItems: 5
      responses:
        '201':
          description: Product created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '400':
          description: Missing required fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error adding product
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    get:
      tags: [Products]
      summary: Get all products (with pagination & filters)
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: type
          schema:
            type: string
      responses:
        '200':
          description: Products list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductListResponse'
        '500':
          description: Server error fetching products
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/products/{productId}:
    get:
      tags: [Products]
      summary: Get a single product
      parameters:
        - in: path
          name: productId
          schema:
            type: string
          required: true
      responses:
        '200':
          description: Product retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error fetching product
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/products/{productId}/review:
    post:
      tags: [Products]
      summary: Add a review to a product
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: productId
          schema:
            type: string
          required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewRequest'
      responses:
        '201':
          description: Review added
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '400':
          description: Review comment is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error adding review
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/products/{productId}/like:
    post:
      tags: [Products]
      summary: Like a product
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: productId
          schema:
            type: string
          required: true
      responses:
        '200':
          description: Product liked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LikeResponse'
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error liking product
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/products/{productId}/unlike:
    post:
      tags: [Products]
      summary: Unlike a product
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: productId
          schema:
            type: string
          required: true
      responses:
        '200':
          description: Product unliked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LikeResponse'
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error unliking product
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  ######################
  # TRANSACTIONS
  ######################
  /api/transactions/buy:
    post:
      tags: [Transactions]
      summary: Create a purchase transaction
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [productId, quantity, deliveryAddress]
              properties:
                productId:
                  type: string
                  description: MongoDB ID of the product
                quantity:
                  type: integer
                  minimum: 1
                deliveryAddress:
                  type: string
      responses:
        '200':
          description: Purchase created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionResponse'
        '400':
          description: Missing required fields, insufficient quantity, insufficient balance, or cannot buy own product
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Product, buyer, or seller not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error during transaction
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/transactions/{transactionId}/confirm-delivery:
    post:
      tags: [Transactions]
      summary: Buyer confirms delivery
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: transactionId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Delivery confirmed and funds released to seller
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionResponse'
        '400':
          description: Transaction cannot be confirmed in current status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Only the buyer can confirm delivery
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Transaction, buyer, or seller not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error during delivery confirmation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/transactions/{transactionId}/mark-shipped:
    post:
      tags: [Transactions]
      summary: Seller marks product as shipped
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: transactionId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Transaction marked as shipped
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionResponse'
        '400':
          description: Transaction cannot be marked as shipped in current status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Only the seller can mark as shipped
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Transaction not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error during status update
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/transactions/{transactionId}/cancel:
    post:
      tags: [Transactions]
      summary: Cancel a transaction
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: transactionId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  example: "Product damaged"
      responses:
        '200':
          description: Transaction cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionResponse'
        '400':
          description: Cannot cancel transaction
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Transaction not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/transactions/{transactionId}/deliver:
    post:
      tags: [Transactions]
      summary: Seller marks product as delivered
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: transactionId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Transaction updated to delivered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionResponse'
        '400':
          description: Cannot update transaction
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Transaction not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/transactions/{transactionId}/release:
    post:
      tags: [Transactions]
      summary: Release escrow funds to seller (admin/system only)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: transactionId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Funds released
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionResponse'
        '400':
          description: Cannot release funds
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Transaction not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/transactions/my:
    get:
      tags: [Transactions]
      summary: List my transactions
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of user transactions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Transaction'
        '500':
          description: Server error fetching transactions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/transactions/{transactionId}:
    get:
      tags: [Transactions]
      summary: Get transaction details
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: transactionId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Transaction details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transaction'
        '404':
          description: Transaction not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error fetching transaction
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  ######################
  # ADMIN
  ######################
  /api/admin/users:
    get:
      tags: [Admin]
      summary: Get all users (admin only)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of all users
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  users:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden (not an admin)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/admin/users/{userId}/restrict:
    post:
      tags: [Admin]
      summary: Restrict or unrestrict a user (admin only)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
          description: The user's public ID
      responses:
        '200':
          description: User restricted or unrestricted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  message: { type: string }
                  user:
                    $ref: '#/components/schemas/User'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden (not an admin)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/admin/products:
    get:
      tags: [Admin]
      summary: Get all products (admin only)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of all products
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  products:
                    type: array
                    items:
                      $ref: '#/components/schemas/Product'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden (not an admin)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/admin/transactions:
    get:
      tags: [Admin]
      summary: Get all transactions (admin only)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of all transactions
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  transactions:
                    type: array
                    items:
                      $ref: '#/components/schemas/Transaction'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden (not an admin)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/admin/users/suspicious:
    get:
      tags: [Admin]
      summary: Get suspicious users (admin only)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of suspicious users
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  suspiciousUsers:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden (not an admin)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/admin/verifications/pending:
    get:
      tags: [Admin]
      summary: Get pending government ID verifications (admin only)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of users with pending ID verifications
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  pending:
                    type: array
                    items:
                      type: object
                      properties:
                        userId: { type: string }
                        fullName: { type: string }
                        email: { type: string }
                        governmentId:
                          type: object
                          properties:
                            status: { type: string }
                            front: { type: string }
                            back: { type: string }
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden (not an admin)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ######################
    # USERS
    ######################
    RegisterRequest:
      type: object
      required: [fullName, email, password, phone, address]
      properties:
        fullName:
          type: string
          minLength: 2
          maxLength: 50
          pattern: '^[a-zA-Z\\s-]+$'
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        phone:
          type: string
        address:
          type: string

    VerifyOtpRequest:
      type: object
      required: [email, otp]
      properties:
        email:
          type: string
          format: email
        otp:
          type: string
          minLength: 6
          maxLength: 6

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    UpdateProfileRequest:
      type: object
      properties:
        username:
          type: string
        location:
          type: string

    RateUserRequest:
      type: object
      required: [rating]
      properties:
        rating:
          type: integer
          minimum: 1
          maximum: 5

    AddBalanceRequest:
      type: object
      required: [amount]
      properties:
        amount:
          type: number
          minimum: 0.01

    User:
      type: object
      properties:
        userId: { type: string }
        fullName: { type: string }
        email: { type: string }
        phone: { type: string }
        address: { type: string }
        username: { type: string }
        location: { type: string }
        profilePic: { type: string }
        govIdFront: { type: string }
        govIdBack: { type: string }
        verified: { type: boolean }
        registrationDate: { type: string, format: date-time }
        rank: { type: number }
        customerRating: { type: number }
        balance: { type: number }
        pendingBalance: { type: number }
        isAdmin: { type: boolean }
        isRestricted: { type: boolean }
        govIdStatus:
          type: string
          enum: [pending, approved, rejected]
        postedProducts:
          type: array
          items:
            type: string
            description: IDs of products posted by the user
        savedProducts:
          type: array
          items:
            type: string
            description: IDs of products saved/liked by the user
        boughtProducts:
          type: array
          items:
            type: string
            description: IDs of products bought by the user
        soldProducts:
          type: array
          items:
            type: string
            description: IDs of products sold by the user
        closeCustomers:
          type: array
          items:
            type: string
            description: IDs of users involved in transactions with this user
        transactionHistory:
          type: array
          items:
            type: string
            description: IDs of transactions involving this user

    AuthResponse:
      type: object
      properties:
        success: { type: boolean }
        message: { type: string }
        token: { type: string }
        user:
          type: object
          properties:
            userId: { type: string }
            fullName: { type: string }
            email: { type: string }
            phone: { type: string }
            address: { type: string }
            verified: { type: boolean }

    LoginResponse:
      type: object
      properties:
        success: { type: boolean }
        token: { type: string }
        user:
          $ref: '#/components/schemas/User'

    UserResponse:
      type: object
      properties:
        success: { type: boolean }
        user:
          $ref: '#/components/schemas/User'

    SuccessMessage:
      type: object
      properties:
        success: { type: boolean }
        message: { type: string }

    ErrorResponse:
      type: object
      properties:
        success: { type: boolean }
        error: { type: string }

    ProfilePicResponse:
      type: object
      properties:
        success: { type: boolean }
        message: { type: string }
        profilePic: { type: string }

    GovIdResponse:
      type: object
      properties:
        success: { type: boolean }
        message: { type: string }
        govIdFront: { type: string }
        govIdBack: { type: string }

    BalanceResponse:
      type: object
      properties:
        success: { type: boolean }
        message: { type: string }
        balance: { type: number }

    ######################
    # PRODUCTS
    ######################
    Product:
      type: object
      properties:
        productId: { type: string }
        title: { type: string }
        description: { type: string }
        price: { type: number }
        type: { type: string }
        originAddress: { type: string }
        images:
          type: array
          items: { type: string }
        initialQuantity: { type: integer }
        quantityAvailable: { type: integer }
        soldQuantity: { type: integer }
        ownerUserId: { type: string }
        ownerName: { type: string }
        likesCount: { type: integer }
        averageRating: { type: number }
        status: { type: string, enum: [available, sold out] }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        reviews:
          type: array
          items:
            $ref: '#/components/schemas/Review'

    Review:
      type: object
      properties:
        comment: { type: string }
        rating: { type: integer }
        userId: { type: string }
        userName: { type: string }
        createdAt: { type: string, format: date-time }

    ProductResponse:
      type: object
      properties:
        success: { type: boolean }
        product:
          $ref: '#/components/schemas/Product'

    ProductListResponse:
      type: object
      properties:
        success: { type: boolean }
        page: { type: integer }
        pages: { type: integer }
        total: { type: integer }
        products:
          type: array
          items:
            $ref: '#/components/schemas/Product'

    ReviewRequest:
      type: object
      required: [comment]
      properties:
        comment:
          type: string
        rating:
          type: integer
          minimum: 0
          maximum: 5

    LikeResponse:
      type: object
      properties:
        success: { type: boolean }
        message: { type: string }
        likesCount: { type: integer }

    ######################
    # TRANSACTIONS
    ######################
    Transaction:
      type: object
      properties:
        _id: { type: string }
        buyerUserId: { type: string }
        sellerUserId: { type: string }
        productId: { type: string }
        quantity: { type: integer }
        totalPrice: { type: number }
        status:
          type: string
          enum: [pending, shipped, delivered, completed, cancelled]
        paymentHeld: { type: boolean }
        platformFeeBuyer: { type: number }
        platformFeeSeller: { type: number }
        netSellerAmount: { type: number }
        deliveryAddress: { type: string }
        date: { type: string, format: date-time }
        buyerConfirmed: { type: boolean }
        cancelledReason: { type: string }
        serviceFeePercent: { type: number }
        releaseDate: { type: string, format: date-time, nullable: true }

    TransactionResponse:
      type: object
      properties:
        success: { type: boolean }
        message: { type: string }
        transaction:
          $ref: '#/components/schemas/Transaction'