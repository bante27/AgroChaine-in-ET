openapi: 3.0.3
info:
  title: Full Marketplace API
  description: Swagger documentation for Users, Products, Transactions, Admin, and Chat APIs.
  version: 1.0.0
servers:
  - url: http://localhost:5000/api
    description: Local development server

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      properties:
        userId:
          type: string
        fullName:
          type: string
        email:
          type: string
        balance:
          type: number
        rank:
          type: number
        postedProducts:
          type: array
          items:
            type: string
        savedProducts:
          type: array
          items:
            type: string
        transactionHistory:
          type: array
          items:
            type: string

    Product:
      type: object
      properties:
        productId:
          type: string
        title:
          type: string
        description:
          type: string
        price:
          type: number
        type:
          type: string
        originAddress:
          type: string
        images:
          type: array
          items:
            type: string
        initialQuantity:
          type: number
        quantityAvailable:
          type: number
        soldQuantity:
          type: number
        ownerUserId:
          type: string
        ownerName:
          type: string
        reviews:
          type: array
          items:
            $ref: '#/components/schemas/Review'
        likesCount:
          type: number
        status:
          type: string

    Review:
      type: object
      properties:
        comment:
          type: string
        rating:
          type: number
        userId:
          type: string
        userName:
          type: string
        createdAt:
          type: string
          format: date-time

    Transaction:
      type: object
      properties:
        buyerUserId:
          type: string
        sellerUserId:
          type: string
        productId:
          type: string
        quantity:
          type: number
        totalPrice:
          type: number
        deliveryAddress:
          type: string
        status:
          type: string
        paymentHeld:
          type: boolean
        releaseDate:
          type: string
          format: date-time
        buyerConfirmed:
          type: boolean
        cancelledReason:
          type: string
        platformFeeBuyer:
          type: number
        platformFeeSeller:
          type: number
        netSellerAmount:
          type: number

security:
  - bearerAuth: []

paths:
  /users/register:
    post:
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                fullName:
                  type: string
                email:
                  type: string
                password:
                  type: string
      responses:
        '201':
          description: User registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

  /users/login:
    post:
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Successful login with JWT
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string

  /products:
    get:
      summary: Get all products
      parameters:
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: limit
          schema:
            type: integer
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: type
          schema:
            type: string
      responses:
        '200':
          description: List of products
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  products:
                    type: array
                    items:
                      $ref: '#/components/schemas/Product'
    post:
      summary: Add a new product
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                title:
                  type: string
                price:
                  type: number
                originAddress:
                  type: string
                type:
                  type: string
                quantity:
                  type: number
                description:
                  type: string
                comment:
                  type: string
                images:
                  type: array
                  items:
                    type: string
                    format: binary
      responses:
        '201':
          description: Product created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'

  /products/{productId}:
    get:
      summary: Get product by ID
      parameters:
        - in: path
          name: productId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Product found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'

  /products/{productId}/review:
    post:
      summary: Add review to product
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: productId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                comment:
                  type: string
                rating:
                  type: integer
      responses:
        '201':
          description: Review added

  /products/{productId}/like:
    post:
      summary: Like a product
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: productId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Product liked

  /products/{productId}/unlike:
    post:
      summary: Unlike a product
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: productId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Product unliked

  /transactions/buy:
    post:
      summary: Buy a product
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                productId:
                  type: string
                quantity:
                  type: integer
                deliveryAddress:
                  type: string
      responses:
        '200':
          description: Transaction created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transaction'

  /chat/send:
    post:
      summary: Send a chat message
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                toUserId:
                  type: string
                message:
                  type: string
      responses:
        '200':
          description: Chat sent

  /admin/users:
    get:
      summary: Get all users (Admin only)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
